workflows:
  ios-unsigned:
    name: iOS build non signé (Sideloadly)
    max_build_duration: 30
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Dépendances Flutter
        script: flutter pub get
      - name: Build iOS sans signature
        script: |
          flutter build ios --release --no-codesign
      - name: Créer l'IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r MaarifMaliEdu.ipa Payload
    artifacts:
      - build/ios/ipa/MaarifMaliEdu.ipa
    publishing:
      email:
        recipients:
          - boulbytoure92@gmail.com
        notify:
          success: true
          failure: true
